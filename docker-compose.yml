services:
  # ─────────────────────────────────────────────
  #  BANCO DE DADOS — PostgreSQL + pgvector
  # ─────────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    container_name: tutoria_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: tutoriatech_user
      POSTGRES_PASSWORD: tutoriatech_pass
      POSTGRES_DB: tutoriatech
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - tutoria_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tutoriatech_user -d tutoriatech"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ─────────────────────────────────────────────
  #  BACKEND — Node.js + Fastify + Prisma
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tutoria_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    # Adicionamos "npx prisma studio --host 0.0.0.0 &" logo antes do "npm run dev"
    command: sh -c "npx prisma generate && npx prisma db push && npx prisma db seed && npx prisma studio --hostname 0.0.0.0 & npm run dev"
    ports:
      - "127.0.0.1:3001:3001" # Porta para a API do backend
      - "127.0.0.1:5555:5555" # Porta para o Prisma Studio
    depends_on:
      db:
        condition: service_healthy
    networks:
      - tutoria_net
    volumes:
      - ./backend:/app
      - /app/node_modules

  # ─────────────────────────────────────────────
  #  FRONTEND — React + Vite + Tailwind CSS
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tutoria_frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:5173:5173"
    depends_on:
      - backend
    networks:
      - tutoria_net
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pg_data:

networks:
  tutoria_net:
    driver: bridge
